<!DOCTYPE html>
<html>
<head>
    <title>Scan Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Scan Results for {{ target }}</h1>
        {% if results %}
            {% for r in results %}
                <div class="card">
                    <h2>{{ r.threat }}</h2>
                    <p><strong>Impact:</strong> {{ r.impact }}</p>
                    <p><strong>Recommendation:</strong> {{ r.recommendation }}</p>
                    <p><strong>Form Details:</strong> {{ r.form }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p class="safe">No XSS vulnerabilities found 🎉</p>
        {% endif %}
    </div>
</body>
</html>
